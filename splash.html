<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bank - Emergency Response System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="logo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
        }

        .splash-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            position: relative;
            overflow: hidden;
        }

        /* Background animation */
        .splash-container::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .splash-container::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -80px;
            right: -80px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .splash-content {
            text-align: center;
            color: white;
            z-index: 10;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 30px;
            animation: scaleIn 0.8s ease 0.2s both;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo-container img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
        }

        .splash-content h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            animation: slideInDown 0.8s ease 0.4s both;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .splash-content p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            opacity: 0.95;
            animation: slideInUp 0.8s ease 0.6s both;
        }

        .tagline {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            font-weight: 300;
            animation: slideInUp 0.8s ease 0.8s both;
        }

        .splash-message {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 20px;
            animation: slideInUp 0.8s ease 1s both;
        }

        .splash-icons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            animation: fadeIn 0.8s ease 1.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .icon-item i {
            font-size: 2.5rem;
            opacity: 0.9;
        }

        .icon-item span {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .loader {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 8px;
            animation: slideInUp 0.8s ease 1.4s both;
        }

        .loader span {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loader span:nth-child(1) { animation-delay: 0s; }
        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-15px);
            }
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .splash-content h1 {
                font-size: 2rem;
            }

            .splash-content p {
                font-size: 1rem;
            }

            .splash-icons {
                gap: 20px;
            }

            .icon-item i {
                font-size: 2rem;
            }

            .splash-container::before {
                width: 250px;
                height: 250px;
            }

            .splash-container::after {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="splash-content">
            <div class="logo-container">
                <img src="logo.png" alt="Pakistan Blood Bank Logo" onerror="this.style.display='none'">
            </div>
            <h1>Blood Bank</h1>
            <p>Emergency Response System</p>
            <div class="tagline">
                <i class="fas fa-heart"></i> Saving Lives, Connecting Hearts
            </div>
            
            <div class="splash-icons">
                <div class="icon-item">
                    <i class="fas fa-heartbeat"></i>
                    <span>Donors</span>
                </div>
                <div class="icon-item">
                    <i class="fas fa-hospital"></i>
                    <span>Hospitals</span>
                </div>
                <div class="icon-item">
                    <i class="fas fa-map-location-dot"></i>
                    <span>Location Match</span>
                </div>
            </div>

            <div class="splash-message">
                Connecting Blood Donors with Hospitals in Critical Times
            </div>

            <div class="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

<script>
    function goToHome() {
        window.location.href = "index.html";
    }

    setTimeout(goToHome, 4000);

    document.addEventListener("click", goToHome);
</script>
    
</body>
</html>
